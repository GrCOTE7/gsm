
services:
  gsm_app:
    container_name: gsm_app
    build:
      context: .
      dockerfile: Dockerfile.prod
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.create_connection(('127.0.0.1', 8000), 2); s.close()",
        ]
      interval: 20s
      timeout: 3s
      retries: 5
      start_period: 20s
    environment:
      FLET_DOCKER: "1"
    volumes:
      - .:/app
      - /app/.venv
    networks:
      - proxy
      - gsm_default

  gsm_caddy:
    image: caddy:2
    container_name: gsm_caddy
    ports:
      - "7777:8000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - gsm_app
    networks:
      - proxy
      - gsm_default


networks:
  proxy:
    external: true
  gsm_default:
    name: gsm_default
