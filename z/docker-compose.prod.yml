services:
  flet:
    container_name: gsm_app
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "8000:8000"
    command: ["sh", "-lc", "uvx watchfiles \"uv run src/main.py\" src"]
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.create_connection(('127.0.0.1', 8000), 2); s.close()",
        ]
      interval: 20s
      timeout: 3s
      retries: 5
      start_period: 20s
    environment:
      FLET_DOCKER: "1"
      # Si ton app Flet utilise des variables, tu peux les mettre ici
      # APP_ENV: "production"
      # API_URL: "https://api.mondomaine.fr"
    volumes:
      - .:/app
      - /app/.venv

